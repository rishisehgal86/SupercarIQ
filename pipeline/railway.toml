[build]
builder = "dockerfile"
dockerfilePath = "pipeline/Dockerfile"

[deploy]
# Railway Cron Service — runs 3x daily: 07:00, 13:00, 19:00 UTC
# Each run: discovery + enrich 3 listings + LLM content generation + TS regeneration
cronSchedule = "0 7,13,19 * * *"
startCommand = "python3 smart_pipeline.py --phase all --enrich-count 3"
restartPolicyType = "never"
healthcheckPath = ""
