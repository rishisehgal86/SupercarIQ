# Railway Web App configuration for SupercarIQ.
#
# ⚠️  IMPORTANT: In Railway dashboard, this service MUST have:
#     Source → Root Directory = "web"
#
# With Root Directory = "web", Railway sets the Docker build context to web/,
# so all COPY commands in the Dockerfile are relative to web/.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 30
